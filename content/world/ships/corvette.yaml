ship:
  id: corvette
  name: "Corvette-Class Frigate"
  size: medium
  rooms:
    - id: bridge
      name: "Bridge"
      type: command
      description:
        base: "Holographic displays cascade across curved consoles."
      exits:
        aft:
          destination: "self:corridor"
          description: "The main corridor."
    - id: corridor
      name: "Main Corridor"
      type: corridor
      exits:
        fore:
          destination: "self:bridge"
          description: "Forward to the bridge."
        port:
          destination: "self:engine_room"
          description: "Port access to engineering."
        down:
          destination: "self:airlock"
          description: "Deck ladder to the airlock."
    - id: engine_room
      name: "Engine Room"
      type: engineering
      exits:
        starboard:
          destination: "self:corridor"
          description: "Back to the corridor."
    - id: airlock
      name: "Airlock"
      type: airlock
      exits:
        up:
          destination: "self:corridor"
          description: "Ladder up to the corridor."
        out:
          destination: "@docked_location"
          description: "External hatch when docked."
