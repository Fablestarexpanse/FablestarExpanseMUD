# Copy to server.toml and adjust for your environment.
# server.toml is gitignored — never commit this file.
websocket_port = 8001
max_connections = 100
tick_rate = 0.25

# Set to true only for local development. Seeds staff/test and player/test accounts.
dev_mode = false

game_currency_display_name = "Digi"
starting_digi_balance = 100
proficiency_combat_hybrid = true

# Always true in production. Requires a JWT secret (see below).
admin_auth_required = true

# REQUIRED when admin_auth_required = true.
# Use: FABLESTAR_ADMIN_JWT_SECRET env var (preferred) or set here.
# Generate with: python -c "import secrets; print(secrets.token_hex(32))"
# admin_jwt_secret = "CHANGE_ME"

# Allowed origins for the admin/player UIs. Comma-separated list.
# cors_origins = ["http://localhost:5173", "http://localhost:5174"]
